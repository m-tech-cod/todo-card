<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Professional developer profile card built with HTML, CSS and JavaScript">
  <title>Profile Card | HNG Stage 1b</title>
  <link rel="stylesheet" href="profile.css">
  <!-- Google Fonts: Inter for clean modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    <nav class="back-nav" aria-label="Navigation">
      <a href="../index.html" class="back-link" aria-label="Go back to homepage">
        <svg class="back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Home
      </a>
    </nav>

    <!-- Main Profile Card -->
    <main class="profile-wrapper">
      <article class="profile-card" aria-labelledby="profile-name">
        
        <!-- Profile Image Section -->
        <div class="profile-card__image-wrapper">
          <div class="profile-card__image-container">
            <img 
              src="../images/tof.jpeg" 
              alt="Profile portrait" 
              class="profile-card__image"
              width="128"
              height="128"
            >
            <div class="profile-card__status-dot" aria-label="Active now"></div>
          </div>
        </div>

        <!-- Profile Info -->
        <div class="profile-card__info">
          <h1 id="profile-name" class="profile-card__name">ALAYDE M. Araffath</h1>
            <p class="profile-card__title">Frontend Developer</p>
            <p class="profile-card__location">Bénin</p>

          <div class="profile-card__bio">
            <p>Building beautiful, accessible web experiences with modern frontend technologies. Passionate about design systems and developer advocacy.</p>
          </div>
        </div>

        <!-- Action Button (Follow/Contact) -->
        <div class="profile-card__action">
          <button id="followButton" class="action-button" aria-label="Follow or contact Sarah Chen">
            <span class="action-button__text">Follow</span>
            <svg class="action-button__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Optional meta: member since -->
        <div class="profile-card__meta">
          <p class="profile-card__member-since">Open to opportunities</p>
        </div>
      </article>
    </main>
  </div>

  <script src="profile.js" defer></script>
</body>
</html>
